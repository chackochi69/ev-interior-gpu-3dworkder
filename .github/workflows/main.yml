name: Build & Push RunPod Image

on:
  push:
    branches: [main]
    paths:
      - "artifacts/api-server/src/pipeline/**"
  workflow_dispatch:

env:
  IMAGE: eddyson6/ev-3d-reconstruction

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: eddyson6
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: artifacts/api-server/src/pipeline
          file: artifacts/api-server/src/pipeline/runpod/Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
